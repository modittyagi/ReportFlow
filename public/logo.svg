<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <linearGradient id="grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#3B82F6"/>
      <stop offset="100%" style="stop-color:#8B5CF6"/>
    </linearGradient>
    <linearGradient id="bar1" x1="0%" y1="100%" x2="0%" y2="0%">
      <stop offset="0%" style="stop-color:#1D4ED8"/>
      <stop offset="100%" style="stop-color:#60A5FA"/>
    </linearGradient>
    <linearGradient id="bar2" x1="0%" y1="100%" x2="0%" y2="0%">
      <stop offset="0%" style="stop-color:#7C3AED"/>
      <stop offset="100%" style="stop-color:#A78BFA"/>
    </linearGradient>
    <linearGradient id="bar3" x1="0%" y1="100%" x2="0%" y2="0%">
      <stop offset="0%" style="stop-color:#EC4899"/>
      <stop offset="100%" style="stop-color:#F472B6"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="4" stdDeviation="8" flood-color="#000" flood-opacity="0.15"/>
    </filter>
  </defs>
  
  <!-- Background rounded square -->
  <rect x="32" y="32" width="448" height="448" rx="96" fill="url(#grad)" filter="url(#shadow)"/>
  
  <!-- Document/Report shape -->
  <rect x="120" y="100" width="272" height="340" rx="24" fill="white"/>
  
  <!-- Report lines -->
  <rect x="152" y="140" width="120" height="12" rx="6" fill="#E5E7EB"/>
  <rect x="152" y="168" width="80" height="8" rx="4" fill="#F3F4F6"/>
  
  <!-- Bar chart -->
  <rect x="152" y="240" width="48" height="140" rx="8" fill="url(#bar1)"/>
  <rect x="216" y="200" width="48" height="180" rx="8" fill="url(#bar2)"/>
  <rect x="280" y="260" width="48" height="120" rx="8" fill="url(#bar3)"/>
  
  <!-- Trend line -->
  <path d="M160 300 Q 240 240 320 260" stroke="#10B981" stroke-width="4" fill="none" stroke-linecap="round"/>
  <circle cx="320" cy="260" r="6" fill="#10B981"/>
  
  <!-- Small checkmark badge -->
  <circle cx="340" cy="140" r="28" fill="#10B981"/>
  <path d="M328 140 L336 148 L352 132" stroke="white" stroke-width="4" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
</svg>
