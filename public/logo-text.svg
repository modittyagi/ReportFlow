<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 100" width="400" height="100">
  <defs>
    <linearGradient id="textGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#3B82F6"/>
      <stop offset="100%" style="stop-color:#8B5CF6"/>
    </linearGradient>
    <linearGradient id="iconGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#3B82F6"/>
      <stop offset="100%" style="stop-color:#8B5CF6"/>
    </linearGradient>
  </defs>
  
  <!-- Icon (chart) -->
  <g transform="translate(0, 10)">
    <rect width="60" height="60" rx="14" fill="url(#iconGrad)"/>
    <rect x="12" y="35" width="10" height="18" rx="3" fill="white" opacity="0.9"/>
    <rect x="26" y="25" width="10" height="28" rx="3" fill="white" opacity="0.9"/>
    <rect x="40" y="30" width="10" height="23" rx="3" fill="white" opacity="0.9"/>
  </g>
  
  <!-- Text: Report -->
  <text x="80" y="52" font-family="system-ui, -apple-system, sans-serif" font-size="42" font-weight="700" fill="#1F2937">Report</text>
  
  <!-- Text: Flow (gradient) -->
  <text x="215" y="52" font-family="system-ui, -apple-system, sans-serif" font-size="42" font-weight="700" fill="url(#textGrad)">Flow</text>
</svg>
